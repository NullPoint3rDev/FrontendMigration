# CI на каждый push/PR в main; CD — только frontend при push в main.
# Требуется self-hosted runner на Windows (метки: self-hosted, windows, wt2-staging).
# CD: checkout frontend в _work; docker-compose и .env с C:\WTStaging (синхронизируется backend deploy).

name: Frontend Staging CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: frontend-staging-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --mode staging

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy frontend to Staging
    needs: [build, secrets]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, windows, wt2-staging]
    concurrency:
      group: staging-frontend-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          clean: true

      - name: Verify Docker access
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          docker version 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) {
            $account = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name
            throw "Docker API not available for $account. Start Docker Desktop. Run the Actions runner service under the same Windows user as Docker (not NETWORK SERVICE). Add that user to local group docker-users, restart the runner service."
          }

      - name: Rebuild and restart frontend
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $stagingEnv = 'C:\WTStaging\BackendStaging\deploy\.env'
          if (-not (Test-Path $stagingEnv)) {
            throw "Missing $stagingEnv - copy deploy/.env.example and configure staging secrets."
          }
          $compose = 'C:\WTStaging\BackendStaging\deploy\docker-compose.yml'
          if (-not (Test-Path $compose)) {
            throw "Missing $compose - run BackendStaging deploy once (syncs compose) or copy deploy folder to C:\WTStaging."
          }
          $env:FRONTEND_BUILD_CONTEXT = $env:GITHUB_WORKSPACE
          docker compose -f $compose --env-file $stagingEnv up -d --build frontend

      - name: Wait for frontend healthy
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $stagingEnv = 'C:\WTStaging\BackendStaging\deploy\.env'
          $compose = 'C:\WTStaging\BackendStaging\deploy\docker-compose.yml'
          $deadline = (Get-Date).AddMinutes(5)
          do {
            $status = docker inspect --format='{{.State.Health.Status}}' wt2-staging-frontend 2>$null
            Write-Host "frontend health: $status"
            if ($status -eq 'healthy') {
              Write-Host "Frontend is healthy"
              exit 0
            }
            Start-Sleep -Seconds 5
          } while ((Get-Date) -lt $deadline)
          docker inspect wt2-staging-frontend --format='{{json .State.Health}}' 2>$null | Write-Host
          docker compose -f $compose --env-file $stagingEnv logs --tail 100 frontend
          throw "Frontend did not become healthy within 5 minutes (last status: $status)"
