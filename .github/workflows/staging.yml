# CI на каждый push/PR в main; CD — только frontend при push в main.
# Требуется self-hosted runner на Windows (метки: self-hosted, windows, wt2-staging).
# CD: checkout в _work; FRONTEND_BUILD_CONTEXT → свежий код; .env с C:\WTStaging\BackendStaging\deploy.

name: Frontend Staging CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: frontend-staging-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --mode staging

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy frontend to Staging
    needs: [build, secrets]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    runs-on: [self-hosted, windows, wt2-staging]
    concurrency:
      group: staging-frontend-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout BackendStaging (docker-compose)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/BackendStaging
          ref: main
          path: BackendStaging

      - name: Checkout FrontendStaging
        uses: actions/checkout@v4
        with:
          ref: main
          path: FrontendStaging
          clean: true

      - name: Verify Docker access
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          docker version 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) {
            $account = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name
            throw "Docker API not available for $account. Start Docker Desktop. Run the Actions runner service under the same Windows user as Docker (not NETWORK SERVICE). Add that user to local group docker-users, restart the runner service."
          }

      - name: Rebuild and restart frontend
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $stagingEnv = 'C:\WTStaging\BackendStaging\deploy\.env'
          if (-not (Test-Path $stagingEnv)) {
            throw "Missing $stagingEnv - copy deploy/.env.example and configure staging secrets."
          }
          $compose = Join-Path $env:GITHUB_WORKSPACE 'BackendStaging\deploy\docker-compose.yml'
          $env:FRONTEND_BUILD_CONTEXT = Join-Path $env:GITHUB_WORKSPACE 'FrontendStaging'
          docker compose -f $compose --env-file $stagingEnv up -d --build frontend

      - name: Wait for frontend healthy
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $stagingEnv = 'C:\WTStaging\BackendStaging\deploy\.env'
          $compose = Join-Path $env:GITHUB_WORKSPACE 'BackendStaging\deploy\docker-compose.yml'
          $deadline = (Get-Date).AddMinutes(2)
          do {
            $status = docker inspect --format='{{.State.Health.Status}}' wt2-staging-frontend 2>$null
            if ($status -eq 'healthy') {
              Write-Host "Frontend is healthy"
              exit 0
            }
            Start-Sleep -Seconds 5
          } while ((Get-Date) -lt $deadline)
          Write-Error "Frontend did not become healthy within 2 minutes (last status: $status)"
          docker compose -f $compose --env-file $stagingEnv logs --tail 50 frontend
          exit 1
